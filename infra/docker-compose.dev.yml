# Docker Compose — Ambiente de Desenvolvimento EncerraDigital
# Uso: docker compose -f infra/docker-compose.dev.yml up -d

version: '3.9'

services:

  # ── Contêiner principal de desenvolvimento ──────────────────────────────
  devcontainer:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    environment:
      - NODE_ENV=development
    networks:
      - encerradigital-dev

  # ── Banco de dados PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: encerradigital_dev
      POSTGRES_USER: encerradigital
      POSTGRES_PASSWORD: dev_password_local_only
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - encerradigital-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U encerradigital"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (cache e sessões) ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - encerradigital-dev
    command: redis-server --appendonly yes

  # ── MinIO (storage S3-compatível para PDFs) ─────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: encerradigital_dev
      MINIO_ROOT_PASSWORD: dev_minio_password_local
    ports:
      - "9000:9000"    # API S3
      - "9001:9001"    # Console web
    volumes:
      - minio_data:/data
    networks:
      - encerradigital-dev
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  encerradigital-dev:
    driver: bridge
