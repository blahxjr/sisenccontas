# Railway — Configuração do serviço Frontend Interno (Next.js)
# Como usar: Railway dashboard → Service → Settings → Config As Code → Path: infra/railway/frontend-interno.toml
# Root Directory (no dashboard): /

[build]
builder = "nixpacks"
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter ./frontend-interno build"

[deploy]
startCommand = "pnpm --filter ./frontend-interno exec next start"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
